<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Song List</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 { margin-bottom: 16px; }
        #search {
            padding: 8px 12px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
        }
        #record-count { margin-bottom: 10px; color: #666; font-size: 0.9em; }
        table {
            border-collapse: collapse;
            width: 100%;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        th, td { border: 1px solid #e0e0e0; padding: 10px 12px; text-align: left; }
        th {
            background-color: #2c4875;
            color: #fff;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        th:hover { background-color: #1a2a47; }
        .sort-indicator { margin-left: 6px; font-size: 0.75em; opacity: 0.7; }
        tr:nth-child(even) td { background-color: #f5f7fa; }
        tr:hover td { background-color: #e8f0fe; }
        #error-msg { color: #c00; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>My Music Library</h1>
    <input type="search" id="search" placeholder="Search songs, artists, albums…" aria-label="Search">
    <p id="record-count"></p>
    <p id="error-msg">Could not load songs.csv. Make sure the file is in the same folder as this page.</p>
    <table id="song-table">
        <thead><tr id="table-header"></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        // Parses a single CSV line, correctly handling double-quoted fields that contain commas.
        function parseCSVLine(line) {
            const fields = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                    if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (ch === ',' && !inQuotes) {
                    fields.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            fields.push(current.trim());
            return fields;
        }

        let allRows = [];
        let headers = [];
        let sortCol = -1;
        let sortAsc = true;

        function renderTable(rows) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            rows.forEach(cols => {
                const tr = document.createElement('tr');
                cols.forEach(val => {
                    const td = document.createElement('td');
                    td.textContent = val;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            document.getElementById('record-count').textContent =
                'Showing ' + rows.length + ' of ' + allRows.length + ' songs';
        }

        function applyFilter() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = query
                ? allRows.filter(cols => cols.some(v => v.toLowerCase().includes(query)))
                : allRows.slice();
            renderTable(filtered);
        }

        function buildHeader() {
            const tr = document.getElementById('table-header');
            tr.innerHTML = '';
            headers.forEach((label, i) => {
                const th = document.createElement('th');
                const span = document.createElement('span');
                span.className = 'sort-indicator';
                span.textContent = '⇅';
                th.textContent = label;
                th.appendChild(span);
                th.addEventListener('click', () => {
                    if (sortCol === i) { sortAsc = !sortAsc; } else { sortCol = i; sortAsc = true; }
                    tr.querySelectorAll('.sort-indicator').forEach((s, j) => {
                        s.textContent = j === sortCol ? (sortAsc ? '▲' : '▼') : '⇅';
                    });
                    allRows.sort((a, b) => {
                        const av = a[i] || '', bv = b[i] || '';
                        const an = parseFloat(av), bn = parseFloat(bv);
                        if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an - bn : bn - an;
                        return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
                    });
                    applyFilter();
                });
                tr.appendChild(th);
            });
        }

        fetch('songs.csv')
            .then(r => { if (!r.ok) throw new Error('fetch failed'); return r.text(); })
            .then(data => {
                // Strip UTF-8 BOM if present
                const cleaned = data.charCodeAt(0) === 0xFEFF ? data.slice(1) : data;
                const lines = cleaned.split(/\r?\n/).filter(l => l.trim() !== '');
                headers = parseCSVLine(lines[0]);
                allRows = lines.slice(1).map(parseCSVLine);
                buildHeader();
                renderTable(allRows);
            })
            .catch(() => { document.getElementById('error-msg').style.display = 'block'; });

        document.getElementById('search').addEventListener('input', applyFilter);
    </script>
</body>
</html>
